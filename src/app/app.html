<h1>Formularz</h1>

<form (submit)="wyslij()">

<label>Imię</label><br>
<input type="text" (input)="ustawImie($event)"><br><br>

<label>Nazwisko</label><br>
<input type="text" (input)="ustawNazwisko($event)"><br><br>

<label>Data urodzenia</label><br>
<input type="date" (input)="ustawDate($event)"><br><br>

<button type="button" (click)="wyslij()">Wyświetl</button>

</form>

@if (pokaz()) {

<hr>

<h2>Dane użytkownika</h2>

<p>Imię: {{ imie() }}</p>
<p>Nazwisko: {{ nazwisko() }}</p>
<p>Data urodzenia: {{ dataUrodzenia() }}</p>

}
